<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Debug</title></head>
<body style="padding:20px;font-family:system-ui;background:#fff;">
<h2>🔍 Debug: Hash Data</h2>
<pre id="output" style="background:#f5f5f5;padding:12px;border-radius:8px;white-space:pre-wrap;"></pre>
<script>
var output = document.getElementById('output');
var hash = window.location.hash;
output.textContent = 'Raw hash: ' + hash + '\n---\n';

if (hash && hash.length > 1) {
  try {
    var decoded = decodeURIComponent(hash.substring(1));
    output.textContent += 'Decoded: ' + decoded + '\n---\n';
    var data = JSON.parse(decoded);
    output.textContent += 'Parsed OK ✅\n';
    output.textContent += 'alphaTex length: ' + (data.alphaTex ? data.alphaTex.length : 'null') + '\n';
    output.textContent += 'bpm: ' + data.bpm + '\n';
    if (data.alphaTex) {
      output.textContent += '\n--- AlphaTex content ---\n';
      output.textContent += data.alphaTex.substring(0, 500);
    }
  } catch(e) {
    output.textContent += 'ERROR: ' + e.message;
  }
} else {
  output.textContent += 'No hash data found';
}
</script>
</body>
</html>
