<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>练习回放</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f6f3ee; color:#24211d; font-family:-apple-system, BlinkMacSystemFont, sans-serif; overflow:hidden; height:100vh; display:flex; flex-direction:column; }
  #alphaTab { flex:1; overflow:auto; -webkit-overflow-scrolling:touch; background:#fff; }
  #alphaTab canvas { display:block; }
  #info { text-align:center; font-size:12px; color:#7a7168; padding:6px; background:#fbf8f3; border-bottom:1px solid #e7e0d8; }
  #controls { background:#fcfaf7; border-top:1px solid #e7e0d8; padding:12px 20px 24px; display:flex; flex-direction:column; gap:10px; box-shadow:0 -8px 24px rgba(36,33,29,0.06); }
  .progress-area { display:flex; align-items:center; gap:12px; }
  .time { font-size:13px; color:#7a7168; font-variant-numeric:tabular-nums; min-width:40px; }
  .track { flex:1; height:4px; background:#e7e0d8; border-radius:2px; position:relative; cursor:pointer; }
  .fill { height:100%; background:#d98b42; border-radius:2px; width:0%; }
  .action-row { display:flex; justify-content:center; align-items:center; gap:20px; }
  .btn { width:56px; height:56px; border-radius:50%; border:none; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; user-select:none; }
  .btn-primary { background:#d98b42; color:#fff; font-size:28px; }
  .btn-primary:active { background:#bf7330; }
  .btn-secondary { background:#fff; color:#176b87; border:1px solid #d8d0c7; font-size:20px; }
  .btn-secondary:active { background:#fbf8f3; }
  .fallback-score {
    display:none; min-height:100%; padding:18px 16px 96px;
    color:#24211d; background:#fff; font:14px/1.65 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    white-space:pre-wrap; word-break:break-word;
  }
  .fallback-score.show { display:block; }
</style>
</head>
<body>
<div id="info">加载中...</div>
<div id="alphaTab"><pre class="fallback-score" id="fallbackScore"></pre></div>
<div id="controls">
  <div class="progress-area">
    <span class="time" id="currentTime">0:00</span>
    <div class="track" id="track"><div class="fill" id="fill"></div></div>
    <span class="time" id="totalTime">0:00</span>
  </div>
  <div class="action-row">
    <button class="btn btn-secondary" id="btnStop">■</button>
    <button class="btn btn-primary" id="btnPlay">▶</button>
  </div>
</div>
<audio id="audioPlayer" style="display:none"></audio>

<script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/alphaTab.min.js"></script>
<script>
(function() {
  var api = new alphaTab.AlphaTabApi(document.getElementById('alphaTab'), {
    core: { fontDirectory: 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/font/' },
    display: { staveProfile: 'tab', noteLabelMode: 'default', layoutMode: 'page' },
    player: { enablePlayer: true, enableCursor: true, enableUserInteraction: false, soundFont: null }
  });

  // Read data from query param
  var params = new URLSearchParams(window.location.search);
  var d = params.get('d');
  var alphaTex = '';
  var bpm = 100;
  var audioPath = '';
  if (d) {
    try {
      var data;
      try { data = JSON.parse(d); }
      catch(parseErr) { data = JSON.parse(decodeURIComponent(d)); }
      alphaTex = data.alphaTex || '';
      bpm = data.bpm || 100;
      audioPath = data.audioPath || '';
    } catch(e) { document.getElementById('info').textContent = '数据解析失败'; }
  }

  var audio = document.getElementById('audioPlayer');
  var btnPlay = document.getElementById('btnPlay');
  var btnStop = document.getElementById('btnStop');
  var currentTimeEl = document.getElementById('currentTime');
  var totalTimeEl = document.getElementById('totalTime');
  var fill = document.getElementById('fill');
  var track = document.getElementById('track');
  var infoEl = document.getElementById('info');
  var fallbackScore = document.getElementById('fallbackScore');

  var state = 'idle'; // idle | playing | paused
  var animId = null;

  function fmt(sec) { var m=Math.floor(sec/60),s=Math.floor(sec%60); return m+':'+(s<10?'0':'')+s; }
  function report(msg) { try { if(window.wx && wx.miniProgram) wx.miniProgram.postMessage({ data: msg }); } catch(e) {} }
  function showRawScore(reason) {
    fallbackScore.textContent = alphaTex || '没有收到谱子内容';
    fallbackScore.className = 'fallback-score show';
    infoEl.textContent = reason || '已显示谱子原文';
    report({ type: 'loaded', fallback: true });
  }

  function loadScore(text) {
    if(!text) { showRawScore('没有收到谱子内容'); return; }
    try {
      fallbackScore.className = 'fallback-score';
      fallbackScore.textContent = '';
      if (typeof api.tex === 'function') {
        api.tex(text);
      } else if (typeof api.load === 'function') {
        api.load(text);
      } else {
        showRawScore('当前 AlphaTab 不支持文本加载，已显示原文');
        return;
      }
      setTimeout(function() {
        if (!api.score) showRawScore('谱子暂未被 AlphaTab 解析，已显示原文');
      }, 1600);
    } catch(e) { console.error('tex error:', e); showRawScore('谱子解析失败，已显示原文'); }
  }

  function syncCursor() { if (audio && audio.duration && api.score) { try { api.setBeatPosition(audio.currentTime * 1000); } catch(e) {} } }

  function animate() {
    if (!audio.paused) {
      var ct = audio.currentTime;
      var dur = audio.duration || 1;
      currentTimeEl.textContent = fmt(ct);
      fill.style.width = Math.min((ct/dur)*100, 100) + '%';
      syncCursor();
      if (ct >= dur - 0.1) { stopPlayback(); return; }
    }
    animId = requestAnimationFrame(animate);
  }

  function startAnim() { if(animId) cancelAnimationFrame(animId); animId = requestAnimationFrame(animate); }
  function stopAnim() { if(animId) { cancelAnimationFrame(animId); animId = null; } }

  function startPlayback() {
    audio.play().then(function() {
      btnPlay.textContent = '❚❚';
      startAnim();
      report({ type: 'state', state: 'playing' });
    }).catch(function(e) { console.error('Audio error:', e); infoEl.textContent = '音频播放失败'; });
  }

  function pausePlayback() { audio.pause(); stopAnim(); btnPlay.textContent = '▶'; report({ type: 'state', state: 'paused' }); }

  function stopPlayback() {
    audio.pause(); audio.currentTime = 0; stopAnim();
    btnPlay.textContent = '▶'; currentTimeEl.textContent = '0:00'; fill.style.width = '0%';
    try { if (api.score) api.setBeatPosition(0); } catch(e) {}
    report({ type: 'state', state: 'stopped' });
  }

  btnPlay.addEventListener('click', function() {
    if (audio.paused) { if(audio.currentTime >= audio.duration-0.1) audio.currentTime = 0; startPlayback(); }
    else { pausePlayback(); }
  });

  btnStop.addEventListener('click', stopPlayback);

  track.addEventListener('click', function(e) {
    var rect = this.getBoundingClientRect();
    var pct = (e.clientX - rect.left) / rect.width;
    var dur = audio.duration || 1;
    audio.currentTime = pct * dur;
    currentTimeEl.textContent = fmt(audio.currentTime);
    fill.style.width = (pct * 100) + '%';
    syncCursor();
  });

  audio.addEventListener('loadedmetadata', function() {
    totalTimeEl.textContent = fmt(audio.duration);
    infoEl.textContent = infoEl.textContent + ' | 音频已加载';
  });
  audio.addEventListener('error', function() { infoEl.textContent = '音频加载失败'; });
  api.scoreLoaded.on(function(score) {
    infoEl.textContent = (score.title || '无名曲') + ' · ' + bpm + ' BPM';
    report({ type: 'loaded' });
  });

  // Auto-load
  if (alphaTex) {
    infoEl.textContent = '谱子已加载 (' + alphaTex.length + ' 字符)';
    setTimeout(function() { loadScore(alphaTex); }, 200);
  }
  if (audioPath) {
    audio.src = audioPath;
    audio.load();
  }

  report({ type: 'ready' });
  console.log('[Replay] initialized');
})();
</script>
</body>
</html>
