<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fingerstyle Player</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#f5f5f5; color:#333;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    overflow:hidden; height:100vh; display:flex; flex-direction:column;
  }
  #alphaTab { flex:1; overflow:auto; -webkit-overflow-scrolling:touch; background:#fff; }
  #alphaTab canvas { display:block; }
  #info { text-align:center; font-size:12px; color:#999; padding:6px; background:#fafafa; border-bottom:1px solid #eee; }
  #controls { background:#fafafa; border-top:1px solid #e0e0e0; padding:12px 16px 20px; display:flex; flex-direction:column; gap:10px; }
  .row { display:flex; justify-content:space-between; align-items:center; }
  .bpm-group { display:flex; align-items:center; gap:8px; }
  .bpm-group label { font-size:14px; color:#666; font-weight:600; }
  .bpm-btn { width:36px; height:36px; border-radius:8px; border:1px solid #ccc; background:#fff; color:#555; font-size:20px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; user-select:none; }
  .bpm-btn:active { background:#f0f0f0; }
  .bpm-input { width:60px; height:36px; text-align:center; font-size:18px; font-weight:700; color:#333; background:#fff; border:1px solid #ccc; border-radius:8px; outline:none; }
  .status-area { display:flex; align-items:center; gap:8px; }
  .status-dot { width:10px; height:10px; border-radius:50%; background:#ccc; transition:background 0.3s; }
  .status-dot.active { background:#e74c3c; box-shadow:0 0 6px #e74c3c; animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .status-text { font-size:13px; color:#999; }
  .timer { font-size:18px; font-weight:700; color:#555; font-variant-numeric:tabular-nums; }
  .action-row { display:flex; gap:10px; }
  .action-btn { flex:1; height:48px; border-radius:12px; border:none; font-size:16px; font-weight:600; cursor:pointer; transition:background 0.2s; -webkit-tap-highlight-color:transparent; user-select:none; }
  .action-btn.practice { background:#d98b42; color:#fff; }
  .action-btn.practice:active { background:#bf7330; }
  .action-btn.practice.recording { background:#e74c3c; }
  .action-btn.practice.recording:active { background:#c0392b; }
  .action-btn.preview { background:#4a90d9; color:#fff; }
  .action-btn.preview:active { background:#357abd; }
  .action-btn.preview.playing { background:#e74c3c; }
  .action-btn.secondary { background:#f0f0f0; color:#666; border:1px solid #ddd; }
  .action-btn.secondary:active { background:#e0e0e0; }
  .action-btn:disabled { opacity:0.4; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="info">加载中...</div>
<div id="alphaTab"></div>
<div id="controls">
  <div class="row">
    <div class="bpm-group">
      <label>BPM</label>
      <button class="bpm-btn" id="bpmDown">−</button>
      <input class="bpm-input" id="bpmInput" type="number" value="100" />
      <button class="bpm-btn" id="bpmUp">+</button>
    </div>
    <div class="status-area">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">就绪</span>
    </div>
    <div class="timer" id="timer">0:00</div>
  </div>
  <div class="action-row">
    <button class="action-btn practice" id="btnPractice">▶ 开始</button>
    <button class="action-btn preview" id="btnPreview">🎵 试听</button>
  </div>
</div>
<script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/alphaTab.min.js"></script>
<script>
(function() {
  // --- Read data from query param ---
  var alphaTex = '';
  var bpm = 100;
  var params = new URLSearchParams(window.location.search);
  var d = params.get('d');
  if (d) {
    try {
      var data = JSON.parse(decodeURIComponent(d));
      alphaTex = data.alphaTex || '';
      bpm = data.bpm || 100;
    } catch(e) { document.getElementById('info').textContent = '数据解析失败'; }
  }

  var api = new alphaTab.AlphaTabApi(document.getElementById('alphaTab'), {
    core: { fontDirectory: 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/font/' },
    display: { staveProfile: 'tab', noteLabelMode: 'default', layoutMode: 'page' },
    player: { enablePlayer: true, enableCursor: true, enableUserInteraction: false, soundFont: null }
  });

  // --- State ---
  var practiceState = 'idle'; // idle | running | paused | finished
  var previewState = 'stopped'; // stopped | playing
  var scoreLoaded = false;
  var totalDurationMs = 0;
  var animId = null;
  var startTime = 0;
  var pausedElapsed = 0;

  var bpmInput = document.getElementById('bpmInput');
  var btnPractice = document.getElementById('btnPractice');
  var btnPreview = document.getElementById('btnPreview');
  var statusText = document.getElementById('statusText');
  var statusDot = document.getElementById('statusDot');
  var timerEl = document.getElementById('timer');
  var infoEl = document.getElementById('info');

  function fmt(sec) { var m=Math.floor(sec/60),s=Math.floor(sec%60); return m+':'+(s<10?'0':'')+s; }
  function report(msg) { try { if(window.wx && wx.miniProgram) wx.miniProgram.postMessage({ data: msg }); } catch(e) {} }

  function calcDuration() {
    try {
      var s = api.score; if(!s) return 60000;
      var b = 0;
      for(var i=0;i<s.masterBars.length;i++) b += (s.masterBars[i].barBeats?s.masterBars[i].barBeats.length:4);
      return (b*60/bpm)*1000;
    } catch(e) { return 60000; }
  }

  // --- Load AlphaTex ---
  function loadScore(text) {
    if(!text) return;
    try {
      api.tex(text);
      scoreLoaded = true;
      if (api.score) {
        totalDurationMs = calcDuration();
        infoEl.textContent = (api.score.title||'无名曲') + ' · ' + bpm + ' BPM';
        console.log('[Player] Loaded:', api.score.title, 'Bars:', api.score.masterBars.length);
      }
      statusText.textContent = '就绪';
      btnPreview.disabled = false;
      report({ type: 'loaded' });
    } catch(e) {
      console.error('tex error:', e);
      infoEl.textContent = '谱子解析失败: ' + (e.message||'');
    }
  }

  // ============ PRACTICE MODE (auto-scroll + recording) ============
  function runPracticeAnim() {
    if(practiceState !== 'running') return;
    var elapsed = (performance.now() - startTime);
    timerEl.textContent = fmt(elapsed/1000);
    if(elapsed >= totalDurationMs && totalDurationMs > 0) {
      stopPractice();
      practiceState = 'finished';
      btnPractice.textContent = '▶ 重复';
      statusText.textContent = '播放结束';
      statusDot.className = 'status-dot';
      report({ type: 'state', state: 'finished', bpm: bpm });
      return;
    }
    try { api.setBeatPosition(elapsed); } catch(e) {}
    animId = requestAnimationFrame(runPracticeAnim);
  }

  function startPractice() {
    bpm = parseInt(bpmInput.value) || bpm;
    if(!scoreLoaded && alphaTex) { loadScore(alphaTex); setTimeout(startPractice, 300); return; }
    // Stop preview if playing
    if (previewState === 'playing') { api.stop(); previewState = 'stopped'; btnPreview.textContent = '🎵 试听'; }
    totalDurationMs = calcDuration();
    practiceState = 'running'; pausedElapsed = 0; startTime = performance.now();
    statusText.textContent = '演奏中'; statusDot.className = 'status-dot active';
    btnPractice.textContent = '■ 停止'; btnPractice.className = 'action-btn practice recording';
    report({ type: 'state', state: 'running', bpm: bpm });
    animId = requestAnimationFrame(runPracticeAnim);
  }

  function stopPractice() {
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    practiceState = 'idle';
    statusText.textContent = '已停止'; statusDot.className = 'status-dot';
    btnPractice.textContent = '▶ 开始'; btnPractice.className = 'action-btn practice';
    timerEl.textContent = '0:00';
    try { api.setBeatPosition(0); } catch(e) {}
    report({ type: 'state', state: 'stopped', bpm: bpm });
  }

  btnPractice.addEventListener('click', function() {
    if (practiceState === 'idle' || practiceState === 'finished') startPractice();
    else stopPractice();
  });

  // ============ PREVIEW MODE (MIDI playback) ============
  function startPreview() {
    bpm = parseInt(bpmInput.value) || bpm;
    if (!scoreLoaded && alphaTex) { loadScore(alphaTex); setTimeout(startPreview, 300); return; }
    // Stop practice mode if running
    if (practiceState === 'running') stopPractice();
    previewState = 'playing';
    btnPreview.textContent = '■ 停止'; btnPreview.className = 'action-btn preview playing';
    statusText.textContent = '试听中'; statusDot.className = 'status-dot active';
    api.play();
  }

  function stopPreview() {
    api.stop();
    previewState = 'stopped';
    btnPreview.textContent = '🎵 试听'; btnPreview.className = 'action-btn preview';
    statusText.textContent = '就绪'; statusDot.className = 'status-dot';
    timerEl.textContent = '0:00';
  }

  btnPreview.addEventListener('click', function() {
    if (previewState === 'stopped') startPreview();
    else stopPreview();
  });

  // Listen for player state changes (preview finished)
  api.playerStateChanged.on(function(e) {
    if (e.state === 0) { // stopped
      if (previewState === 'playing') {
        previewState = 'stopped';
        btnPreview.textContent = '🎵 试听'; btnPreview.className = 'action-btn preview';
        statusText.textContent = '就绪'; statusDot.className = 'status-dot';
        timerEl.textContent = '0:00';
      }
    }
  });

  api.positionChanged.on(function(e) {
    if (previewState === 'playing') {
      timerEl.textContent = fmt(e.currentTime / 1000);
    }
  });

  // --- Auto-load ---
  if (alphaTex) {
    infoEl.textContent = '谱子已加载 (' + alphaTex.length + ' 字符)';
    bpmInput.value = bpm;
    btnPreview.disabled = true;
    setTimeout(function() { loadScore(alphaTex); }, 200);
  }

  // --- BPM controls ---
  document.getElementById('bpmDown').addEventListener('click', function() {
    var v = parseInt(bpmInput.value)||100; v = Math.max(20, v-5);
    bpmInput.value = v; bpm = v;
  });
  document.getElementById('bpmUp').addEventListener('click', function() {
    var v = parseInt(bpmInput.value)||100; v = Math.min(300, v+5);
    bpmInput.value = v; bpm = v;
  });
  bpmInput.addEventListener('change', function() {
    var v = parseInt(this.value); if(isNaN(v)||v<20) v=20; if(v>300) v=300;
    this.value = v; bpm = v;
  });

  report({ type: 'ready' });
  console.log('[Player] initialized');
})();
</script>
</body>
</html>
