<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fingerstyle Player</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0f0f23; color:#e0e0e0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    overflow:hidden; height:100vh; display:flex; flex-direction:column;
  }
  #alphaTab { flex:1; overflow:auto; -webkit-overflow-scrolling:touch; background:#1a1a2e; }
  #alphaTab canvas { display:block; }
  #info { text-align:center; font-size:12px; color:#666; padding:6px; background:#0f0f23; }
  #controls {
    background:#16213e; border-top:1px solid #0f3460;
    padding:12px 16px 20px; display:flex; flex-direction:column; gap:10px;
  }
  .row { display:flex; justify-content:space-between; align-items:center; }
  .bpm-group { display:flex; align-items:center; gap:8px; }
  .bpm-group label { font-size:14px; color:#aaa; font-weight:600; }
  .bpm-btn {
    width:36px; height:36px; border-radius:50%; border:1px solid #0f3460;
    background:#1a1a2e; color:#e0e0e0; font-size:20px; font-weight:600;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    -webkit-tap-highlight-color:transparent; user-select:none;
  }
  .bpm-btn:active { background:#0f3460; }
  .bpm-input {
    width:60px; height:36px; text-align:center; font-size:18px; font-weight:700;
    color:#e0e0e0; background:#0f0f23; border:1px solid #0f3460; border-radius:8px; outline:none;
  }
  .status-area { display:flex; align-items:center; gap:8px; }
  .status-dot { width:10px; height:10px; border-radius:50%; background:#555; transition:background 0.3s; }
  .status-dot.active { background:#ff4444; box-shadow:0 0 6px #ff4444; animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .status-text { font-size:13px; color:#888; }
  .timer { font-size:18px; font-weight:700; color:#e0e0e0; font-variant-numeric:tabular-nums; }
  .action-row { display:flex; gap:12px; }
  .action-btn {
    flex:1; height:48px; border-radius:12px; border:none;
    font-size:17px; font-weight:600; cursor:pointer;
    transition:background 0.2s; -webkit-tap-highlight-color:transparent; user-select:none;
  }
  .action-btn.primary { background:linear-gradient(135deg,#0f3460,#1a5276); color:#fff; }
  .action-btn.primary:active { background:linear-gradient(135deg,#1a5276,#0f3460); }
  .action-btn.primary.recording { background:linear-gradient(135deg,#8b0000,#cc0000); }
  .action-btn.primary.recording:active { background:linear-gradient(135deg,#cc0000,#8b0000); }
  .action-btn.secondary { background:#1a1a2e; color:#aaa; border:1px solid #0f3460; }
  .action-btn.secondary:active { background:#2a2a3e; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="info">加载中...</div>
<div id="alphaTab"></div>
<div id="controls">
  <div class="row">
    <div class="bpm-group">
      <label>BPM</label>
      <button class="bpm-btn" id="bpmDown">−</button>
      <input class="bpm-input" id="bpmInput" type="number" value="100" />
      <button class="bpm-btn" id="bpmUp">+</button>
    </div>
    <div class="status-area">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">就绪</span>
    </div>
    <div class="timer" id="timer">0:00</div>
  </div>
  <div class="action-row">
    <button class="action-btn primary" id="btnStart">▶ 开始</button>
    <button class="action-btn secondary hidden" id="btnPause">❚❚ 暂停</button>
  </div>
</div>
<script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.7.4/dist/alphaTab.min.js"></script>
<script>
(function() {
  var api = new alphaTab.AlphaTabApi(document.getElementById('alphaTab'), {
    core: { file: null, fontDirectory: 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.7.4/dist/font/' },
    display: { staveProfile: 'tab', noteLabelMode: 'default', layoutMode: 'page' },
    player: { enablePlayer: false, enableCursor: true, enableUserInteraction: false, soundFont: null }
  });

  // State
  var state = 'idle'; // idle | running | paused | finished
  var bpm = 100;
  var alphaTex = '';
  var animId = null;
  var startTime = 0;
  var pausedElapsed = 0;
  var totalDurationMs = 0;
  var scoreLoaded = false;

  // DOM refs
  var bpmInput = document.getElementById('bpmInput');
  var btnStart = document.getElementById('btnStart');
  var btnPause = document.getElementById('btnPause');
  var statusText = document.getElementById('statusText');
  var statusDot = document.getElementById('statusDot');
  var timerEl = document.getElementById('timer');

  function fmt(sec) {
    var m = Math.floor(sec/60), s = Math.floor(sec%60);
    return m + ':' + (s<10?'0':'') + s;
  }

  function report(msg) {
    try { if (window.wx && wx.miniProgram) wx.miniProgram.postMessage({ data: msg }); } catch(e) {}
  }

  function calcDuration() {
    try {
      var s = api.score; if(!s) return 60000;
      var b = 0;
      for(var i=0;i<s.masterBars.length;i++) b += (s.masterBars[i].barBeats?s.masterBars[i].barBeats.length:4);
      return (b*60/bpm)*1000;
    } catch(e) { return 60000; }
  }

  function loadScore(text) {
    alphaTex = text;
    if(!text) return;
    try {
      api.teardown();
      api = new alphaTab.AlphaTabApi(document.getElementById('alphaTab'), {
        core: { file: null, fontDirectory: 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.7.4/dist/font/' },
        display: { staveProfile: 'tab', noteLabelMode: 'default', layoutMode: 'page' },
        player: { enablePlayer: false, enableCursor: true, enableUserInteraction: false, soundFont: null }
      });
      api.scoreLoaded.on(function(score) {
        scoreLoaded = true;
        totalDurationMs = calcDuration();
        document.getElementById('info').textContent = (score.title||'无名曲') + ' · ' + bpm + ' BPM';
        statusText.textContent = '就绪';
        report({ type: 'loaded' });
      });
      api.load(text);
    } catch(e) {
      document.getElementById('info').textContent = '谱子解析失败';
    }
  }

  function animate() {
    if(state !== 'running') return;
    var elapsed = (performance.now() - startTime);
    timerEl.textContent = fmt(elapsed/1000);
    if(elapsed >= totalDurationMs && totalDurationMs > 0) {
      cancelAnimationFrame(animId); animId = null;
      state = 'finished';
      statusText.textContent = '播放结束';
      statusDot.className = 'status-dot';
      btnStart.textContent = '▶ 重复';
      btnStart.className = 'action-btn primary';
      togglePauseBtn(false);
      report({ type: 'state', state: 'finished', bpm: bpm });
      return;
    }
    try { api.setBeatPosition(elapsed); } catch(e) {}
    animId = requestAnimationFrame(animate);
  }

  function togglePauseBtn(show) {
    btnPause.className = 'action-btn secondary' + (show ? '' : ' hidden');
  }

  function doStart() {
    bpm = parseInt(bpmInput.value) || bpm;
    if(!scoreLoaded) { loadScore(alphaTex); setTimeout(doStart, 300); return; }
    totalDurationMs = calcDuration();
    state = 'running';
    pausedElapsed = 0;
    startTime = performance.now();
    statusText.textContent = '演奏中';
    statusDot.className = 'status-dot active';
    btnStart.textContent = '■ 停止';
    btnStart.className = 'action-btn primary recording';
    togglePauseBtn(true);
    btnPause.textContent = '❚❚ 暂停';
    report({ type: 'state', state: 'running', bpm: bpm });
    animId = requestAnimationFrame(animate);
  }

  function doStop() {
    cancelAnimationFrame(animId); animId = null;
    state = 'idle';
    statusText.textContent = '已停止';
    statusDot.className = 'status-dot';
    btnStart.textContent = '▶ 开始';
    btnStart.className = 'action-btn primary';
    togglePauseBtn(false);
    timerEl.textContent = '0:00';
    try { api.setBeatPosition(0); } catch(e) {}
    report({ type: 'state', state: 'stopped', bpm: bpm });
  }

  btnStart.addEventListener('click', function() {
    if(state === 'idle' || state === 'finished') doStart();
    else if(state === 'running' || state === 'paused') doStop();
  });

  btnPause.addEventListener('click', function() {
    if(state === 'running') {
      cancelAnimationFrame(animId); animId = null;
      pausedElapsed = performance.now() - startTime;
      state = 'paused';
      statusText.textContent = '已暂停';
      btnPause.textContent = '▶ 继续';
      report({ type: 'state', state: 'paused', bpm: bpm });
    } else if(state === 'paused') {
      state = 'running';
      startTime = performance.now() - pausedElapsed;
      statusText.textContent = '演奏中';
      btnPause.textContent = '❚❚ 暂停';
      report({ type: 'state', state: 'running', bpm: bpm });
      animId = requestAnimationFrame(animate);
    }
  });

  document.getElementById('bpmDown').addEventListener('click', function() {
    var v = parseInt(bpmInput.value)||100; v = Math.max(20, v-5);
    bpmInput.value = v; bpm = v;
  });
  document.getElementById('bpmUp').addEventListener('click', function() {
    var v = parseInt(bpmInput.value)||100; v = Math.min(300, v+5);
    bpmInput.value = v; bpm = v;
  });
  bpmInput.addEventListener('change', function() {
    var v = parseInt(this.value); if(isNaN(v)||v<20) v=20; if(v>300) v=300;
    this.value = v; bpm = v;
  });

  // Check URL hash for initial AlphaTex data
  function initFromHash() {
    try {
      var hash = window.location.hash;
      if (hash && hash.length > 1) {
        var decoded = decodeURIComponent(hash.substring(1));
        var data = JSON.parse(decoded);
        if (data.alphaTex) {
          bpm = data.bpm || 100;
          bpmInput.value = bpm;
          loadScore(data.alphaTex);
          return;
        }
      }
    } catch(e) { console.error('[Player] Hash parse error:', e); }
    document.getElementById('info').textContent = '等待谱子...';
  }

  initFromHash();
  report({ type: 'ready' });
  console.log('[Player] initialized');
})();
</script>
</body>
</html>
