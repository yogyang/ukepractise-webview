<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>指弹练习器</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#f6f3ee; color:#24211d;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    overflow:hidden; height:100vh; display:flex; flex-direction:column;
  }
  #alphaTab { flex:1; overflow:auto; -webkit-overflow-scrolling:touch; background:#fff; }
  #alphaTab canvas { display:block; }
  #info { text-align:center; font-size:12px; color:#7a7168; padding:6px; background:#fbf8f3; border-bottom:1px solid #e7e0d8; }
  #controls { background:#fcfaf7; border-top:1px solid #e7e0d8; padding:12px 16px 20px; display:flex; flex-direction:column; gap:10px; box-shadow:0 -8px 24px rgba(36,33,29,0.06); }
  .row { display:flex; justify-content:space-between; align-items:center; }
  .bpm-group { display:flex; align-items:center; gap:8px; }
  .bpm-group label { font-size:14px; color:#7a7168; font-weight:600; }
  .bpm-btn { width:36px; height:36px; border-radius:8px; border:1px solid #d8d0c7; background:#fff; color:#176b87; font-size:20px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; user-select:none; }
  .bpm-btn:active { background:#fbf8f3; }
  .bpm-input { width:60px; height:36px; text-align:center; font-size:18px; font-weight:700; color:#24211d; background:#fff; border:1px solid #d8d0c7; border-radius:8px; outline:none; }
  .status-area { display:flex; align-items:center; gap:8px; }
  .status-dot { width:10px; height:10px; border-radius:50%; background:#b0a79e; transition:background 0.3s; }
  .status-dot.active { background:#d95f42; box-shadow:0 0 8px rgba(217,95,66,0.45); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .status-text { font-size:13px; color:#7a7168; }
  .timer { font-size:18px; font-weight:700; color:#24211d; font-variant-numeric:tabular-nums; }
  .action-row { display:flex; gap:10px; }
  .action-btn { flex:1; height:48px; border-radius:12px; border:none; font-size:16px; font-weight:600; cursor:pointer; transition:background 0.2s; -webkit-tap-highlight-color:transparent; user-select:none; }
  .action-btn.practice { background:#d98b42; color:#fff; }
  .action-btn.practice:active { background:#bf7330; }
  .action-btn.practice.recording { background:#e74c3c; }
  .action-btn.practice.recording:active { background:#c0392b; }
  .action-btn.preview { background:#176b87; color:#fff; }
  .action-btn.preview:active { background:#11556b; }
  .action-btn.preview.playing { background:#d95f42; }
  .action-btn.secondary { background:#fff; color:#176b87; border:1px solid #d8d0c7; }
  .action-btn.secondary:active { background:#fbf8f3; }
  .action-btn:disabled { opacity:0.4; }
  .fallback-score {
    display:none; min-height:100%; padding:18px 16px 96px;
    color:#24211d; background:#fff; font:14px/1.65 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    white-space:pre-wrap; word-break:break-word;
  }
  .fallback-score.show { display:block; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="info">加载中...</div>
<div id="alphaTab"><pre class="fallback-score" id="fallbackScore"></pre></div>
<div id="controls">
  <div class="row">
    <div class="bpm-group">
      <label>BPM</label>
      <button class="bpm-btn" id="bpmDown">−</button>
      <input class="bpm-input" id="bpmInput" type="number" value="100" />
      <button class="bpm-btn" id="bpmUp">+</button>
    </div>
    <div class="status-area">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">就绪</span>
    </div>
    <div class="timer" id="timer">0:00</div>
  </div>
  <div class="action-row">
    <button class="action-btn practice" id="btnPractice">▶ 开始</button>
    <button class="action-btn preview" id="btnPreview">🎵 试听</button>
  </div>
</div>
<script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/alphaTab.min.js"></script>
<script>
(function() {
  // --- Read data from query param ---
  var alphaTex = '';
  var bpm = 100;
  var params = new URLSearchParams(window.location.search);
  var d = params.get('d');
  if (d) {
    try {
      var data;
      try { data = JSON.parse(d); }
      catch(parseErr) { data = JSON.parse(decodeURIComponent(d)); }
      alphaTex = data.alphaTex || '';
      bpm = data.bpm || 100;
    } catch(e) { document.getElementById('info').textContent = '数据解析失败'; }
  }

  var api = new alphaTab.AlphaTabApi(document.getElementById('alphaTab'), {
    core: { fontDirectory: 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/font/' },
    display: { staveProfile: 'tab', noteLabelMode: 'default', layoutMode: 'page' },
    player: {
      enablePlayer: true,
      enableCursor: true,
      enableUserInteraction: false,
      soundFont: 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/soundfont/sonivox.sf2'
    }
  });

  // --- State ---
  var practiceState = 'idle'; // idle | running | paused | finished
  var previewState = 'stopped'; // stopped | playing
  var scoreLoaded = false;
  var totalDurationMs = 0;
  var animId = null;
  var startTime = 0;
  var pausedElapsed = 0;

  var bpmInput = document.getElementById('bpmInput');
  var btnPractice = document.getElementById('btnPractice');
  var btnPreview = document.getElementById('btnPreview');
  var statusText = document.getElementById('statusText');
  var statusDot = document.getElementById('statusDot');
  var timerEl = document.getElementById('timer');
  var infoEl = document.getElementById('info');
  var fallbackScore = document.getElementById('fallbackScore');

  function fmt(sec) { var m=Math.floor(sec/60),s=Math.floor(sec%60); return m+':'+(s<10?'0':'')+s; }
  function report(msg) { try { if(window.wx && wx.miniProgram) wx.miniProgram.postMessage({ data: msg }); } catch(e) {} }
  function getScoreTitle() { return api.score && api.score.title ? api.score.title : '无名曲'; }
  function showRawScore(reason) {
    fallbackScore.textContent = alphaTex || '没有收到谱子内容';
    fallbackScore.className = 'fallback-score show';
    scoreLoaded = !!alphaTex;
    totalDurationMs = 60000;
    statusText.textContent = '就绪';
    btnPreview.disabled = false;
    infoEl.textContent = reason || '已显示谱子原文';
    report({ type: 'loaded', fallback: true });
  }

  function calcDuration() {
    try {
      var s = api.score; if(!s) return 60000;
      var b = 0;
      for(var i=0;i<s.masterBars.length;i++) b += (s.masterBars[i].barBeats?s.masterBars[i].barBeats.length:4);
      return (b*60/bpm)*1000;
    } catch(e) { return 60000; }
  }

  // --- Load AlphaTex ---
  function loadScore(text) {
    if(!text) { showRawScore('没有收到谱子内容'); return; }
    try {
      fallbackScore.className = 'fallback-score';
      fallbackScore.textContent = '';
      if (typeof api.tex === 'function') {
        api.tex(text);
      } else if (typeof api.load === 'function') {
        api.load(text);
      } else {
        showRawScore('当前 AlphaTab 不支持文本加载，已显示原文');
        return;
      }
      setTimeout(function() {
        if (!api.score && !scoreLoaded) {
          showRawScore('谱子暂未被 AlphaTab 解析，已显示原文');
        }
      }, 1600);
    } catch(e) {
      console.error('tex error:', e);
      showRawScore('谱子解析失败，已显示原文');
    }
  }

  // ============ PRACTICE MODE (auto-scroll + recording) ============
  function runPracticeAnim() {
    if(practiceState !== 'running') return;
    var elapsed = (performance.now() - startTime);
    timerEl.textContent = fmt(elapsed/1000);
    if(elapsed >= totalDurationMs && totalDurationMs > 0) {
      stopPractice();
      practiceState = 'finished';
      btnPractice.textContent = '▶ 重复';
      statusText.textContent = '播放结束';
      statusDot.className = 'status-dot';
      report({ type: 'state', state: 'finished', bpm: bpm });
      return;
    }
    try { if (api.score) api.setBeatPosition(elapsed); } catch(e) {}
    animId = requestAnimationFrame(runPracticeAnim);
  }

  function startPractice() {
    bpm = parseInt(bpmInput.value) || bpm;
    if(!scoreLoaded && alphaTex) { loadScore(alphaTex); setTimeout(startPractice, 300); return; }
    // Stop preview if playing
    if (previewState === 'playing') { api.stop(); previewState = 'stopped'; btnPreview.textContent = '🎵 试听'; }
    totalDurationMs = calcDuration();
    practiceState = 'running'; pausedElapsed = 0; startTime = performance.now();
    statusText.textContent = '演奏中'; statusDot.className = 'status-dot active';
    btnPractice.textContent = '■ 停止'; btnPractice.className = 'action-btn practice recording';
    report({ type: 'state', state: 'running', bpm: bpm });
    animId = requestAnimationFrame(runPracticeAnim);
  }

  function stopPractice() {
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    practiceState = 'idle';
    statusText.textContent = '已停止'; statusDot.className = 'status-dot';
    btnPractice.textContent = '▶ 开始'; btnPractice.className = 'action-btn practice';
    timerEl.textContent = '0:00';
    try { if (api.score) api.setBeatPosition(0); } catch(e) {}
    report({ type: 'state', state: 'stopped', bpm: bpm });
  }

  btnPractice.addEventListener('click', function() {
    if (practiceState === 'idle' || practiceState === 'finished') startPractice();
    else stopPractice();
  });

  // ============ PREVIEW MODE (visual scroll - same as practice but without recording) ============
  function startPreview() {
    bpm = parseInt(bpmInput.value) || bpm;
    if (!scoreLoaded && alphaTex) { loadScore(alphaTex); setTimeout(startPreview, 300); return; }
    if (practiceState === 'running') stopPractice();
    totalDurationMs = calcDuration();
    previewState = 'playing'; pausedElapsed = 0; startTime = performance.now();
    btnPreview.textContent = '■ 停止'; btnPreview.className = 'action-btn preview playing';
    statusText.textContent = '试听中'; statusDot.className = 'status-dot active';
    try {
      if (api.score && typeof api.playPause === 'function') api.playPause();
      else if (api.score && typeof api.play === 'function') api.play();
    } catch(e) {
      console.warn('[Player] Preview audio unavailable:', e);
      infoEl.textContent = '试听音频暂不可用，正在预览进度';
    }
    animId = requestAnimationFrame(function fn() {
      if (previewState !== 'playing') return;
      var elapsed = (performance.now() - startTime);
      timerEl.textContent = fmt(elapsed/1000);
      if (elapsed >= totalDurationMs && totalDurationMs > 0) {
        stopPreview();
        btnPreview.textContent = '🎵 重播'; btnPreview.className = 'action-btn preview';
        return;
      }
      try { if (api.score) api.setBeatPosition(elapsed); } catch(e) {}
      animId = requestAnimationFrame(fn);
    });
  }

  function stopPreview() {
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    try {
      if (api.score && typeof api.stop === 'function') api.stop();
      else if (api.score && typeof api.pause === 'function') api.pause();
    } catch(e) {}
    previewState = 'stopped';
    btnPreview.textContent = '🎵 试听'; btnPreview.className = 'action-btn preview';
    statusText.textContent = '就绪'; statusDot.className = 'status-dot';
    timerEl.textContent = '0:00';
    try { if (api.score) api.setBeatPosition(0); } catch(e) {}
  }

  btnPreview.addEventListener('click', function() {
    if (previewState === 'stopped') startPreview();
    else stopPreview();
  });

  api.scoreLoaded.on(function(score) {
    scoreLoaded = true;
    totalDurationMs = calcDuration();
    infoEl.textContent = (score.title || getScoreTitle()) + ' · ' + bpm + ' BPM';
    statusText.textContent = '就绪';
    btnPreview.disabled = false;
    report({ type: 'loaded' });
  });
  api.renderFinished.on(function() {
    console.log('[Player] Render finished');
  });
  if (api.playerReady) {
    api.playerReady.on(function() { console.log('[Player] Audio player ready'); });
  }

  // --- Auto-load ---
  if (alphaTex) {
    infoEl.textContent = '谱子已加载 (' + alphaTex.length + ' 字符)';
    bpmInput.value = bpm;
    btnPreview.disabled = true;
    setTimeout(function() {
      loadScore(alphaTex);
    }, 200);
  }

  // --- BPM controls ---
  document.getElementById('bpmDown').addEventListener('click', function() {
    var v = parseInt(bpmInput.value)||100; v = Math.max(20, v-5);
    bpmInput.value = v; bpm = v;
  });
  document.getElementById('bpmUp').addEventListener('click', function() {
    var v = parseInt(bpmInput.value)||100; v = Math.min(300, v+5);
    bpmInput.value = v; bpm = v;
  });
  bpmInput.addEventListener('change', function() {
    var v = parseInt(this.value); if(isNaN(v)||v<20) v=20; if(v>300) v=300;
    this.value = v; bpm = v;
  });

  report({ type: 'ready' });
  console.log('[Player] initialized');
})();
</script>
</body>
</html>
