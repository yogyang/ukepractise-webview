<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Test AlphaTex</title></head>
<body>
<div id="alphaTab" style="width:100%;height:90vh;"></div>
<script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/alphaTab.min.js"></script>
<script>
var api = new alphaTab.AlphaTabApi(document.getElementById('alphaTab'), {
  core: { fontDirectory: 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/font/' },
  display: { staveProfile: 'tab', noteLabelMode: 'default', layoutMode: 'page' }
});

// Test 1: Official example format
var tex1 = "\\title 'Test' . 3.3.4";
console.log('Test 1:', tex1);
try {
  api.tex(tex1);
  console.log('Test 1 score:', api.score ? api.score.title : 'null');
} catch(e) { console.error('Test 1 error:', e); }

// Check after 2 seconds
setTimeout(function() {
  console.log('After 2s - score:', api.score ? api.score.title : 'null');
  console.log('Score tracks:', api.score ? api.score.tracks.length : 0);
}, 2000);
</script>
</body>
</html>
