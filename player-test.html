<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Player</title>
</head>
<body style="background:#fff;padding:20px;font-family:system-ui;">
<div id="info">加载中...</div>
<script>
var info = document.getElementById('info');
info.textContent = 'JS 运行正常 ✅';

// Try to read from query param 'd'
var params = new URLSearchParams(window.location.search);
var encoded = params.get('d');

if (encoded) {
  try {
    // Try base64 decode
    var decoded = decodeURIComponent(escape(atob(encoded)));
    var data = JSON.parse(decoded);
    info.textContent = '数据解析成功 ✅ ' + data.alphaTex.length + ' chars, BPM: ' + data.bpm;
  } catch(e) {
    info.textContent = '解析失败: ' + e.message;
  }
} else {
  info.textContent = '无数据参数, URL: ' + window.location.href;
}
</script>
</body>
</html>
