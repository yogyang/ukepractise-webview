<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Player</title>
</head>
<body style="background:#fff;padding:20px;font-family:system-ui;">
<div id="info">加载中...</div>
<script>
var info = document.getElementById('info');
info.textContent = 'JS 运行正常 ✅';

var hash = window.location.hash;
if (hash && hash.length > 1) {
  try {
    var data = JSON.parse(decodeURIComponent(hash.substring(1)));
    info.textContent = 'Hash 解析成功 ✅ 长度 ' + data.alphaTex.length;
  } catch(e) {
    info.textContent = 'Hash 解析失败: ' + e.message;
  }
} else {
  info.textContent = 'Hash 为空: "' + hash + '" (URL: ' + window.location.href + ')';
}
</script>
</body>
</html>
